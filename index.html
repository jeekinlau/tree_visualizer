<!DOCTYPE html>
<html lang="en">

<head>
  <title>Orchard Tree Spacing Visualizer</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="Interactive tool for visualizing and planning orchard tree layouts with GPS tracking">
  <meta name="keywords" content="orchard, tree spacing, GPS, field planning, agriculture">
  <meta name="theme-color" content="#4CAF50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Orchard Planner">

  <!-- Leaflet CSS and JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Replace the Leaflet Measure Plugin section with these new imports -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

  <!-- External stylesheet for better organization and mobile responsiveness -->
  <link rel="stylesheet" href="styles.css" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <div id="container">
    <div id="sidebar">
      <h1>Orchard Tree Spacing Visualizer</h1>

      <div class="input-group">
        <label for="tree_spacing">Tree spacing within rows (ft):</label>
        <input type="number" id="tree_spacing" value="16" min="1" max="1000" step="0.5" required aria-label="Tree spacing within rows in feet">
      </div>

      <div class="input-group">
        <label for="row_spacing">Row spacing (ft):</label>
        <input type="number" id="row_spacing" value="16" min="1" max="1000" step="0.5" required aria-label="Row spacing in feet">
      </div>

      <div class="input-group">
        <label for="num_rows">Number of rows:</label>
        <input type="number" id="num_rows" value="10" min="1" max="1000" step="1" required aria-label="Number of rows">
      </div>

      <div class="input-group">
        <label for="trees_per_row">Trees per row:</label>
        <input type="number" id="trees_per_row" value="10" min="1" max="1000" step="1" required aria-label="Trees per row">
      </div>

      <div class="input-group">
        <label for="rotation">Field rotation (degrees):</label>
        <input type="number" id="rotation" value="0" min="0" max="360" step="1" aria-label="Field rotation in degrees">
      </div>

      <div class="input-group">
        <label for="tree_color">Tree marker color:</label>
        <select id="tree_color">
          <option value="red">Red</option>
          <option value="green">Green</option>
          <option value="blue">Blue</option>
          <option value="yellow">Yellow</option>
          <option value="purple">Purple</option>
        </select>
      </div>

      <div class="input-group">
        <label for="map_type">Select map type:</label>
        <select id="map_type">
          <option value="satellite">Satellite</option>
          <option value="streets">Streets</option>
        </select>
      </div>

      <button id="generate" style="width: 100%; margin-bottom: 15px;">Generate Tree Layout</button>

      <button id="location_btn">Show My Current Location</button>
      <button id="track_location_btn">Start Continuous GPS Tracking</button>
      <button id="stop_tracking_btn">Stop GPS Tracking</button>
      <div id="location_status"></div>

      <!-- Add after the existing GPS buttons -->
      <div class="input-group">
        <label for="location_source">GPS Source:</label>
        <select id="location_source">
          <option value="browser">Browser GPS</option>
          <option value="external">External GPS</option>
        </select>
      </div>
      <div id="gps_status" class="gps-status">
        <div>Source: <span id="gps_source">None</span></div>
        <div>Signal: <span id="gps_signal">No Fix</span></div>
        <div>Data Age: <span id="gps_age">-</span></div>
      </div>

      <div class="input-group">
        <label for="follow_mode">Auto follow location:</label>
        <select id="follow_mode">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>

      <div class="input-group">
        <label for="tracking_interval">GPS update interval (sec):</label>
        <input type="number" id="tracking_interval" value="2" min="1" max="30">
      </div>

      <div class="action-buttons">
        <button id="rotate_left">↻ Clockwise</button>
        <button id="rotate_right">↺ Counter-clockwise</button>
        <button id="move_up">↑ Move Up</button>
        <button id="move_down">↓ Move Down</button>
        <button id="move_left">← Move Left</button>
        <button id="move_right">→ Move Right</button>
      </div>

      <div class="instructions">
        <h4>Measurement Tool Instructions:</h4>
        <ul>
          <li>Click the ruler icon on the map</li>
          <li>Draw lines/shapes to measure</li>
          <li>Click points to measure</li>
          <li>Double-click to finish measurement</li>
        </ul>
      </div>
      <button id="export_field" style="width: 100%; margin-top: 20px; background-color: #673AB7;">
        Export Field Design
      </button>
      <ul>
        <p>&nbsp</p>
        <p>&nbsp</p>
      </ul>
    </div>

    <button id="toggle_sidebar"><span class="toggle-icon">◄</span></button>

    <div id="map"></div>

    <div class="location-badge" id="location_badge">
      <div class="location-field"><span>Lat:</span> <span id="current_lat">-</span></div>
      <div class="location-field"><span>Lng:</span> <span id="current_lng">-</span></div>
      <div class="location-field"><span>Acc:</span> <span id="current_accuracy">-</span> m</div>
      <div class="location-field"><span>Last update:</span> <span id="last_update">-</span></div>
    </div>
  </div>

  <script>
    // Update the map initialization

    const map = L.map('map', {
      maxZoom: 22,
      minZoom: 1,
      zoomSnap: 0.1,
      zoomDelta: 0.5,
      wheelDebounceTime: 40,
      wheelPxPerZoomLevel: 60,
      bounceAtZoomLimits: false,
      preferCanvas: true,
      renderer: L.canvas(),
      // iOS specific options
      tap: true,
      touchZoom: 'center',
      dragging: true,
      // Performance options
      fadeAnimation: false,
      zoomAnimation: true,
      markerZoomAnimation: true,
      transform3DLimit: 2 ^ 30
    }).setView([32.65322, -83.73808], 16);

    // Detect display characteristics
    const isRetina = window.devicePixelRatio > 1;
    const tileSize = isRetina ? 512 : 256;
    const zoomOffset = isRetina ? -1 : 0;

    // Common tile layer options
    const commonTileOptions = {
      maxZoom: 22,
      maxNativeZoom: 19,
      noWrap: true,
      detectRetina: true,
      keepBuffer: 8,
      updateWhenIdle: false,
      updateWhenZooming: false,
      preferCanvas: true,
      bounceAtZoomLimits: false,
      touchZoom: 'center',
      fadeAnimation: false,
      zoomAnimation: true,
      crossOrigin: true
    };

    // Add satellite layer (default)
    let satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      ...commonTileOptions,
      attribution: 'Tiles &copy; Esri',
      tileSize: tileSize,
      zoomOffset: zoomOffset,
      zoomSnap: 0,
      zoomDelta: 0.25,
      errorTileUrl: 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7',
      on: {
        tileerror: function (e) {
          console.log('Tile failed to load:', e);
          e.tile.src = e.url; // Retry loading the tile
        }
      }
    }).addTo(map);

    // Create streets layer
    let streetsLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      ...commonTileOptions,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      tileSize: 256,
      zoomSnap: 0.1,
      zoomDelta: 0.5,
      errorTileUrl: '',
      // Enhanced caching
      crossOrigin: true
    });

    // Update map options
    map.options.smoothWheelZoom = true;
    map.options.wheelDebounceTime = 100;
    map.options.preferCanvas = true;


    // Initialize the FeatureGroup to store editable layers
    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    // Configure the draw control
    const drawControl = new L.Control.Draw({
      draw: {
        marker: false,
        circle: false,
        circlemarker: false,
        rectangle: false,
        polygon: false,
        polyline: {
          shapeOptions: {
            color: '#FFA500',  // Bright orange
            weight: 3,         // Line weight
            opacity: 1,
            lineCap: 'round',
            lineJoin: 'round'
          },
          metric: false,
          feet: true,
          showLength: true,
          guidelineDistance: 5,
          vertices: {
            first: {
              icon: new L.DivIcon({
                className: 'leaflet-div-icon',
                html: '<div style="width: 6px; height: 6px; background-color: #FFA500; border-radius: 50%; border: 1px solid white;"></div>'
              })
            },
            mid: {
              icon: new L.DivIcon({
                className: 'leaflet-div-icon',
                html: '<div style="width: 6px; height: 6px; background-color: #FFA500; border-radius: 50%; border: 1px solid white;"></div>'
              })
            },
            last: {
              icon: new L.DivIcon({
                className: 'leaflet-div-icon',
                html: '<div style="width: 6px; height: 6px; background-color: #FFA500; border-radius: 50%; border: 1px solid white;"></div>'
              })
            }
          }
        }
      },
      edit: {
        featureGroup: drawnItems,
        remove: true
      }
    });
    map.addControl(drawControl);

    // Handle created measurements
    map.on('draw:created', function (e) {
      const layer = e.layer;
      drawnItems.addLayer(layer);

      // Calculate and display measurement
      if (layer instanceof L.Polyline) {
        const distanceInFeet = calculateDistanceInFeet(layer);
        layer.bindPopup(`Distance: ${distanceInFeet.toFixed(2)} feet`).openPopup();
      }
    });

    // Calculate distance in feet
    function calculateDistanceInFeet(layer) {
      const latlngs = layer.getLatLngs();
      let totalDistance = 0;

      for (let i = 1; i < latlngs.length; i++) {
        totalDistance += latlngs[i - 1].distanceTo(latlngs[i]);
      }

      // Convert meters to feet (1 meter = 3.28084 feet)
      return totalDistance * 3.28084;
    }

    // Remove old measurement handlers if they exist
    map.off('measurestart');
    map.off('measurefinish');
    map.off('measurestop');



    // Store tree markers and data
    let treeMarkers = L.layerGroup().addTo(map);
    let trees = [];
    let treesRotated = [];
    let baseLat = 32.65322;
    let baseLng = -83.73808;





    // Create a layer for the user's location marker
    let userLocationMarker = null;
    let userLocationCircle = null;
    let watchId = null;
    let isTracking = false;
    let locationHistory = [];
    let locationHistoryLayer = L.layerGroup().addTo(map);

    // Get DOM elements
    const sidebar = document.getElementById('sidebar');
    const toggleSidebarBtn = document.getElementById('toggle_sidebar');
    const toggleIcon = toggleSidebarBtn.querySelector('.toggle-icon');
    const treeSpacingInput = document.getElementById('tree_spacing');
    const rowSpacingInput = document.getElementById('row_spacing');
    const numRowsInput = document.getElementById('num_rows');
    const treesPerRowInput = document.getElementById('trees_per_row');
    const rotationInput = document.getElementById('rotation');
    const treeColorSelect = document.getElementById('tree_color');
    const mapTypeSelect = document.getElementById('map_type');
    const generateBtn = document.getElementById('generate');
    const locationBtn = document.getElementById('location_btn');
    const trackLocationBtn = document.getElementById('track_location_btn');
    const stopTrackingBtn = document.getElementById('stop_tracking_btn');
    const followModeSelect = document.getElementById('follow_mode');
    const trackingIntervalInput = document.getElementById('tracking_interval');
    const locationStatus = document.getElementById('location_status');
    const locationBadge = document.getElementById('location_badge');
    const currentLat = document.getElementById('current_lat');
    const currentLng = document.getElementById('current_lng');
    const currentAccuracy = document.getElementById('current_accuracy');
    const lastUpdate = document.getElementById('last_update');
    const rotateLeftBtn = document.getElementById('rotate_left');
    const rotateRightBtn = document.getElementById('rotate_right');
    const moveUpBtn = document.getElementById('move_up');
    const moveDownBtn = document.getElementById('move_down');
    const moveLeftBtn = document.getElementById('move_left');
    const moveRightBtn = document.getElementById('move_right');

    // Get location source select element
    const locationSource = document.getElementById('location_source');

    // Load saved settings from localStorage
    function loadSettings() {
      try {
        const saved = localStorage.getItem('orchardSettings');
        if (saved) {
          const settings = JSON.parse(saved);
          if (settings.treeSpacing) treeSpacingInput.value = settings.treeSpacing;
          if (settings.rowSpacing) rowSpacingInput.value = settings.rowSpacing;
          if (settings.numRows) numRowsInput.value = settings.numRows;
          if (settings.treesPerRow) treesPerRowInput.value = settings.treesPerRow;
          if (settings.rotation) rotationInput.value = settings.rotation;
          if (settings.treeColor) treeColorSelect.value = settings.treeColor;
          if (settings.mapType) mapTypeSelect.value = settings.mapType;
          if (settings.followMode) followModeSelect.value = settings.followMode;
          if (settings.trackingInterval) trackingIntervalInput.value = settings.trackingInterval;
          if (settings.baseLat && settings.baseLng) {
            baseLat = settings.baseLat;
            baseLng = settings.baseLng;
            map.setView([baseLat, baseLng], 16);
          }
        }
      } catch (error) {
        console.error('Error loading settings:', error);
      }
    }

    // Save settings to localStorage
    function saveSettings() {
      try {
        const settings = {
          treeSpacing: parseFloat(treeSpacingInput.value),
          rowSpacing: parseFloat(rowSpacingInput.value),
          numRows: parseInt(numRowsInput.value),
          treesPerRow: parseInt(treesPerRowInput.value),
          rotation: parseFloat(rotationInput.value),
          treeColor: treeColorSelect.value,
          mapType: mapTypeSelect.value,
          followMode: followModeSelect.value,
          trackingInterval: parseInt(trackingIntervalInput.value),
          baseLat: baseLat,
          baseLng: baseLng
        };
        localStorage.setItem('orchardSettings', JSON.stringify(settings));
      } catch (error) {
        console.error('Error saving settings:', error);
      }
    }

    // Load settings on page load
    loadSettings();


    // Validate required elements
    if (!locationSource) {
      console.error('Location source select element not found');
      // Create default element
      locationSource = document.createElement('select');
      locationSource.id = 'location_source';
      locationSource.innerHTML = `
      <option value="browser">Browser GPS</option>
      <option value="external">External GPS</option>
  `;
      // Add to sidebar
      sidebar.appendChild(locationSource);
    }

    // Modified startLocationTracking function
    function startLocationTracking() {
      if (isTracking) return;

      // Reset tracking state
      isTracking = true;
      locationHistory = [];
      locationHistoryLayer.clearLayers();

      // Update UI
      trackLocationBtn.style.display = 'none';
      stopTrackingBtn.style.display = 'block';
      trackLocationBtn.classList.add('tracking-active');

      const interval = parseInt(trackingIntervalInput.value) * 1000;

      if (locationSource.value === 'browser') {
        // Use browser's GPS
        locationStatus.textContent = "Using browser GPS...";
        startBrowserGPS(interval);
      } else {
        // Use external GPS data that iOS is already receiving
        locationStatus.textContent = "Using external GPS...";
        startExternalGPS(interval);
      }
    }

    // Browser GPS function
    function startBrowserGPS(interval) {
      if (!navigator.geolocation) {
        locationStatus.textContent = "Geolocation not supported";
        return;
      }

      watchId = navigator.geolocation.watchPosition(
        handlePositionUpdate,
        handleLocationError,
        {
          enableHighAccuracy: true,
          timeout: interval,
          maximumAge: 0
        }
      );
    }

    // External GPS function - uses iOS location services
    // Modify startExternalGPS function

    function startExternalGPS(interval) {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {

        DeviceOrientationEvent.requestPermission()
          .then(response => {
            if (response === 'granted') {
              startGPSTracking(interval);
            } else {
              locationStatus.textContent = "Permission denied for external GPS";
              stopLocationTracking();
            }
          })
          .catch(error => {
            console.error('GPS Permission Error:', error);
            locationStatus.textContent = "Error requesting GPS permission";
            stopLocationTracking();
            // Fall back to browser GPS
            startBrowserGPS(interval);
          });
      } else {
        startBrowserGPS(interval);
      }
    }

    // Unified position update handler
    function handlePositionUpdate(position) {
      // Update last GPS data time
      lastUpdateTime = Date.now();

      const { lat, lng, accuracy } = updateLocationDisplay(position);
      updateLocationMarker(lat, lng, accuracy);

      // Update GPS status
      const gpsSource = document.getElementById('gps_source');
      const gpsSignal = document.getElementById('gps_signal');
      const gpsAge = document.getElementById('gps_age');

      // Determine GPS source
      if (locationSource.value === 'external') {
        gpsSource.textContent = 'External GPS';
        gpsSource.className = 'gps-active';
      } else {
        gpsSource.textContent = 'Browser GPS';
        gpsSource.className = 'gps-active';
      }

      // Check signal quality based on accuracy
      if (accuracy <= 5) {
        gpsSignal.textContent = 'Excellent';
        gpsSignal.className = 'gps-active';
      } else if (accuracy <= 10) {
        gpsSignal.textContent = 'Good';
        gpsSignal.className = 'gps-active';
      } else if (accuracy <= 20) {
        gpsSignal.textContent = 'Fair';
        gpsSignal.className = 'gps-active';
      } else {
        gpsSignal.textContent = 'Poor';
        gpsSignal.className = 'gps-inactive';
      }

      // Calculate and display data age
      const timestamp = position.timestamp ? position.timestamp : Date.now();
      const age = Date.now() - timestamp;
      gpsAge.textContent = age < 1000 ? 'Current' : Math.round(age / 1000) + 's ago';
      gpsAge.className = age < 2000 ? 'gps-active' : 'gps-inactive';

      if (locationHistory.length === 0) {
        baseLat = lat;
        baseLng = lng;
        map.setView([lat, lng], 18);
      }
    }
    let lastUpdateTime = Date.now();
    const GPS_TIMEOUT = 5000; // 5 seconds

    function checkGPSStatus() {
      const gpsSource = document.getElementById('gps_source');
      const gpsSignal = document.getElementById('gps_signal');
      const gpsAge = document.getElementById('gps_age');

      if (isTracking) {
        const timeSinceLastUpdate = Date.now() - lastUpdateTime;
        if (timeSinceLastUpdate > GPS_TIMEOUT) {
          gpsSource.textContent = 'No Data';
          gpsSource.className = 'gps-inactive';
          gpsSignal.textContent = 'No Fix';
          gpsSignal.className = 'gps-inactive';
          gpsAge.textContent = 'Timeout';
          gpsAge.className = 'gps-inactive';
        }
      } else {
        // Not tracking, show inactive state
        gpsSource.textContent = 'Not Tracking';
        gpsSource.className = 'gps-inactive';
        gpsSignal.textContent = 'Inactive';
        gpsSignal.className = 'gps-inactive';
        gpsAge.textContent = '-';
        gpsAge.className = 'gps-inactive';
      }
    }

    // Start GPS status monitoring
    setInterval(checkGPSStatus, 1000);

    // Toggle sidebar function
    function toggleSidebar() {
      sidebar.classList.toggle('collapsed');
      toggleSidebarBtn.classList.toggle('collapsed');
      toggleIcon.classList.toggle('collapsed');

      // Change toggle icon
      if (toggleIcon.classList.contains('collapsed')) {
        toggleIcon.innerHTML = '►';
      } else {
        toggleIcon.innerHTML = '◄';
      }

      // Force map to resize immediately
      map.invalidateSize(false);
    }

    // Function to get current time as string
    function getCurrentTimeString() {
      const now = new Date();
      return now.toLocaleTimeString();
    }

    // Function to update location display
    function updateLocationDisplay(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const accuracy = position.coords.accuracy;

      // Update location badge
      currentLat.textContent = lat.toFixed(6);
      currentLng.textContent = lng.toFixed(6);
      currentAccuracy.textContent = accuracy.toFixed(2);
      lastUpdate.textContent = getCurrentTimeString();

      // Show location badge if not already visible
      locationBadge.style.display = 'block';

      return { lat, lng, accuracy };
    }

    // Function to update location marker
    function updateLocationMarker(lat, lng, accuracy) {
      // If we already have a marker, remove it
      if (userLocationMarker) {
        map.removeLayer(userLocationMarker);
      }
      if (userLocationCircle) {
        map.removeLayer(userLocationCircle);
      }

      // Add a marker at the user's location
      userLocationMarker = L.circleMarker([lat, lng], {
        radius: 8,
        color: '#fff',
        fillColor: '#2196F3',
        fillOpacity: 1,
        weight: 2
      }).addTo(map);

      // Add a circle showing accuracy
      userLocationCircle = L.circle([lat, lng], {
        radius: accuracy,
        color: '#2196F3',
        fillColor: '#2196F3',
        fillOpacity: 0.15,
        weight: 1
      }).addTo(map);

      // Update location history
      if (isTracking) {
        // Add point to location history
        locationHistory.push([lat, lng]);

        // Update location history path
        locationHistoryLayer.clearLayers();
        L.polyline(locationHistory, {
          color: '#2196F3',
          weight: 3,
          opacity: 0.7
        }).addTo(locationHistoryLayer);
      }

      // Center map if follow mode is enabled
      if (isTracking && followModeSelect.value === 'yes') {
        map.setView([lat, lng]);
      }
    }

    // Function to get user's current location once
    function getUserLocation() {
      locationStatus.textContent = "Requesting your location...";

      if (!navigator.geolocation) {
        locationStatus.textContent = "Geolocation is not supported by your browser";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        // Success callback
        function (position) {
          const { lat, lng, accuracy } = updateLocationDisplay(position);
          locationStatus.textContent = `Location found! Accuracy: ${Math.round(accuracy)} meters`;

          // Update location marker
          updateLocationMarker(lat, lng, accuracy);

          // Center map on user's location
          map.setView([lat, lng], 18);

          // Update base coordinates for tree generation
          baseLat = lat;
          baseLng = lng;
        },
        // Error callback
        function (error) {
          handleLocationError(error);
        },
        // Options
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    // Function to handle location errors
    function handleLocationError(error) {
      switch (error.code) {
        case error.PERMISSION_DENIED:
          locationStatus.textContent = "User denied the request for Geolocation";
          break;
        case error.POSITION_UNAVAILABLE:
          locationStatus.textContent = "Location information is unavailable";
          break;
        case error.TIMEOUT:
          locationStatus.textContent = "The request to get user location timed out";
          break;
        case error.UNKNOWN_ERROR:
          locationStatus.textContent = "An unknown error occurred";
          break;
      }
    }



    // Function to stop location tracking
    function stopLocationTracking() {
      if (!isTracking) return;

      // Stop tracking
      isTracking = false;
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      // Clear GPS status
      const gpsSource = document.getElementById('gps_source');
      const gpsSignal = document.getElementById('gps_signal');
      const gpsAge = document.getElementById('gps_age');

      gpsSource.textContent = 'Not Tracking';
      gpsSource.className = 'gps-inactive';
      gpsSignal.textContent = 'Inactive';
      gpsSignal.className = 'gps-inactive';
      gpsAge.textContent = '-';
      gpsAge.className = 'gps-inactive';

      // Update UI
      trackLocationBtn.style.display = 'block';
      stopTrackingBtn.style.display = 'none';
      trackLocationBtn.classList.remove('tracking-active');
      locationStatus.textContent = "GPS tracking stopped. Track has been preserved.";
    }

    // Function to convert feet to degrees based on latitude
    function ftToDeg(feet, lat) {
      // At the equator, 1 degree of latitude ≈ 364,000 feet
      const latDeg = feet / 364000;

      // At the equator, 1 degree of longitude ≈ 364,000 feet
      // Adjust by cosine of latitude
      const lngDeg = feet / (364000 * Math.cos(lat * Math.PI / 180));

      return { lat: latDeg, lng: lngDeg };
    }

    /**
     * Generate tree layout based on user input
     * Validates inputs and creates circular markers for each tree position
     */
    function generateTrees() {
      console.log("Generating trees...");

      // Clear existing markers
      treeMarkers.clearLayers();

      const treeSpacing = parseFloat(treeSpacingInput.value);
      const rowSpacing = parseFloat(rowSpacingInput.value);
      const numRows = parseInt(numRowsInput.value);
      const treesPerRow = parseInt(treesPerRowInput.value);
      const rotation = parseFloat(rotationInput.value);

      // Input validation with user feedback
      if (isNaN(treeSpacing) || treeSpacing <= 0 || treeSpacing > 1000) {
        alert('Please enter a valid tree spacing (1-1000 feet)');
        treeSpacingInput.focus();
        return;
      }
      if (isNaN(rowSpacing) || rowSpacing <= 0 || rowSpacing > 1000) {
        alert('Please enter a valid row spacing (1-1000 feet)');
        rowSpacingInput.focus();
        return;
      }
      if (isNaN(numRows) || numRows <= 0 || numRows > 1000) {
        alert('Please enter a valid number of rows (1-1000)');
        numRowsInput.focus();
        return;
      }
      if (isNaN(treesPerRow) || treesPerRow <= 0 || treesPerRow > 1000) {
        alert('Please enter a valid number of trees per row (1-1000)');
        treesPerRowInput.focus();
        return;
      }

      // Save settings after successful validation
      saveSettings();

      console.log(`Tree spacing: ${treeSpacing}, Row spacing: ${rowSpacing}`);
      console.log(`Rows: ${numRows}, Trees per row: ${treesPerRow}, Rotation: ${rotation}`);

      // Generate base tree coordinates (before rotation)
      trees = [];
      for (let row = 0; row < numRows; row++) {
        for (let col = 0; col < treesPerRow; col++) {
          trees.push({
            x: col * treeSpacing,
            y: row * rowSpacing
          });
        }
      }

      console.log(`Generated ${trees.length} tree positions`);

      // Get map center for base positioning if not tracking
      if (!isTracking || locationHistory.length === 0) {
        const mapCenter = map.getCenter();
        baseLat = mapCenter.lat;
        baseLng = mapCenter.lng;
      }

      // Apply rotation and place trees
      treesRotated = [];
      updateTreePositions(0, 0, rotation, true);
    }

    // Function to update tree positions
    function updateTreePositions(dx = 0, dy = 0, dangle = 0, isNewGeneration = false) {
      // Get current angle
      let currentAngle = isNewGeneration ? 0 : parseFloat(rotationInput.value);
      let newAngle = currentAngle + dangle;

      // Update rotation input if angle changed
      if (dangle !== 0) {
        rotationInput.value = newAngle;
      }

      // Clear existing markers
      treeMarkers.clearLayers();

      // Get map center for calculations
      const treeColor = treeColorSelect.value;

      // Conversion factor based on latitude
      const degConversion = ftToDeg(1, baseLat);

      // Calculate rotated positions
      treesRotated = trees.map(tree => {
        // Apply translation if not a new generation
        let xPos = tree.x;
        let yPos = tree.y;

        if (!isNewGeneration && treesRotated.length > 0) {
          // If we already have rotated trees, adjust from previous positions
          xPos = tree.x + dx;
          yPos = tree.y + dy;

          // Update the base tree positions for future movements
          tree.x = xPos;
          tree.y = yPos;
        }

        // Apply rotation
        const angleRad = newAngle * Math.PI / 180;
        const xRot = xPos * Math.cos(angleRad) - yPos * Math.sin(angleRad);
        const yRot = xPos * Math.sin(angleRad) + yPos * Math.cos(angleRad);

        // Convert to lat/lng
        const lat = baseLat + yRot * degConversion.lat;
        const lng = baseLng + xRot * degConversion.lng;

        return {
          lat: lat,
          lng: lng
        };
      });

      // Add markers to map
      treesRotated.forEach(tree => {
        L.circleMarker([tree.lat, tree.lng], {
          radius: 3,
          color: treeColor,
          fillColor: treeColor,
          fillOpacity: 0.7,
          stroke: false
        }).addTo(treeMarkers);
      });

      console.log(`Updated ${treesRotated.length} tree positions`);
    }

    // Event listeners
    toggleSidebarBtn.addEventListener('click', toggleSidebar);

    generateBtn.addEventListener('click', function () {
      console.log("Generate button clicked");
      generateTrees();
    });

    locationBtn.addEventListener('click', function () {
      getUserLocation();
    });

    trackLocationBtn.addEventListener('click', function () {
      startLocationTracking();
    });

    stopTrackingBtn.addEventListener('click', function () {
      stopLocationTracking();
    });

    rotateLeftBtn.addEventListener('click', function () {
      updateTreePositions(0, 0, -1);
    });

    rotateRightBtn.addEventListener('click', function () {
      updateTreePositions(0, 0, 1);
    });

    moveUpBtn.addEventListener('click', function () {
      updateTreePositions(0, 10, 0);
    });

    moveDownBtn.addEventListener('click', function () {
      updateTreePositions(0, -10, 0);
    });

    moveLeftBtn.addEventListener('click', function () {
      updateTreePositions(-10, 0, 0);
    });

    moveRightBtn.addEventListener('click', function () {
      updateTreePositions(10, 0, 0);
    });

    mapTypeSelect.addEventListener('change', function () {
      const mapType = mapTypeSelect.value;
      if (mapType === 'satellite') {
        map.removeLayer(streetsLayer);
        satelliteLayer.addTo(map);
      } else {
        map.removeLayer(satelliteLayer);
        streetsLayer.addTo(map);
      }
    });

    // Handle tracking interval changes
    trackingIntervalInput.addEventListener('change', function () {
      if (isTracking) {
        // Restart tracking with new interval
        stopLocationTracking();
        startLocationTracking();
      }
    });

    // Ensure map responsiveness on window resize
    window.addEventListener('resize', function () {
      map.invalidateSize(false);
    });


    locationSource.addEventListener('change', function () {
      if (isTracking) {
        stopLocationTracking();
        startLocationTracking();
      }
    });

document.getElementById('export_field').addEventListener('click', function() {
    const fieldData = {
        trees: treesRotated,
        baseLat: baseLat,

        treeColor: treeColorSelect.value,

        rotation: parseFloat(rotationInput.value)
    };

    // Update the script section of the exported content to include iOS support
    const locationScript = `
          let watchId = null;
          let isTracking = false;

          function startLocationTracking() {
              if (!navigator.geolocation) {
                  alert("Geolocation is not supported by your browser");
                  return;
              }

              if (typeof DeviceOrientationEvent !== 'undefined' && 
                  typeof DeviceOrientationEvent.requestPermission === 'function') {
                  // iOS device
                  DeviceOrientationEvent.requestPermission()
                      .then(response => {
                          if (response === 'granted') {
                              startGPSTracking();
                          } else {
                              alert("Permission denied for GPS access");
                          }
                      })
                      .catch(console.error);
              } else {
                  // Non-iOS device
                  startGPSTracking();
              }
          }

          function startGPSTracking() {
              isTracking = true;
              watchId = navigator.geolocation.watchPosition(
                  updateLocation,
                  function(error) {
                      alert("Error getting location: " + error.message);
                  },
                  {
                      enableHighAccuracy: true,
                      timeout: 10000,
                      maximumAge: 0
                  }
              );
          }

          function updateLocation(position) {
              const lat = position.coords.latitude;
              const lng = position.coords.longitude;
              const accuracy = position.coords.accuracy;
              
              document.getElementById('current_lat').textContent = lat.toFixed(6);
              document.getElementById('current_lng').textContent = lng.toFixed(6);
              document.getElementById('current_accuracy').textContent = accuracy.toFixed(2);
              document.getElementById('last_update').textContent = new Date().toLocaleTimeString();
              locationBadge.style.display = 'block';
              
              if (userLocationMarker) map.removeLayer(userLocationMarker);
              if (userLocationCircle) map.removeLayer(userLocationCircle);
              
              userLocationMarker = L.circleMarker([lat, lng], {
                  radius: 8,
                  color: '#fff',
                  fillColor: '#2196F3',
                  fillOpacity: 1,
                  weight: 2
              }).addTo(map);
              
              userLocationCircle = L.circle([lat, lng], {
                  radius: accuracy,
                  color: '#2196F3',
                  fillColor: '#2196F3',
                  fillOpacity: 0.15,
                  weight: 1
              }).addTo(map);
              
              map.setView([lat, lng]);
          }

          // Start continuous tracking when the location button is clicked
          locationBtn.addEventListener('click', function() {
              if (!isTracking) {
                  startLocationTracking();
                  this.textContent = 'Stop Tracking';
              } else {
                  if (watchId !== null) {
                      navigator.geolocation.clearWatch(watchId);
                      watchId = null;
                  }
                  isTracking = false;
                  this.textContent = 'Show My Location';
              }
          });
    `;

    // Update the export content with the new location functionality
    const exportContent = `<!DOCTYPE html>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
        <style>
            body { margin: 0; padding: 0; }

            .location-badge {
                position: absolute;
                bottom: 20px;

                background-color: rgba(255, 255, 255, 0.8);
                padding: 8px 12px;
                border-radius: 4px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.2);
                z-index: 1000;
                display: none;
            }
            .location-field { margin-bottom: 5px; }
            .location-field span { font-weight: bold; }
            #location_btn {
                position: absolute;
                top: 10px;
                right: 10px;
                z-index: 1000;
                background-color: #2196F3;
                color: white;
                border: none;
                padding: 10px;
                border-radius: 4px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <button id="location_btn">Show My Location</button>
        <div class="location-badge" id="location_badge">
            <div class="location-field"><span>Lat:</span> <span id="current_lat">-</span></div>
            <div class="location-field"><span>Lng:</span> <span id="current_lng">-</span></div>
            <div class="location-field"><span>Acc:</span> <span id="current_accuracy">-</span> m</div>
            <div class="location-field"><span>Last update:</span> <span id="last_update">-</span></div>
        </div>
        <script>
            const fieldData = ${JSON.stringify(fieldData)};
            
            // Detect display characteristics
            const isRetina = window.devicePixelRatio > 1;
            const tileSize = isRetina ? 512 : 256;
            const zoomOffset = isRetina ? -1 : 0;
            
            // Initialize map with enhanced options
            const map = L.map('map', {
                maxZoom: 22,
                minZoom: 1,
                zoomSnap: 0.1,
                zoomDelta: 0.5,
                wheelDebounceTime: 40,
                wheelPxPerZoomLevel: 60,
                bounceAtZoomLimits: false,
                preferCanvas: true,
                renderer: L.canvas(),
                // iOS specific options
                tap: true,
                touchZoom: 'center',
                dragging: true,

                fadeAnimation: false,
                zoomAnimation: true,
                markerZoomAnimation: true,
                transform3DLimit: 2 ^ 30
            }).setView([fieldData.baseLat, fieldData.baseLng], 18);
            
            // Add satellite layer with enhanced options
            const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri',
                maxZoom: 22,

                noWrap: true,
                detectRetina: true,

                keepBuffer: 16,

                bounceAtZoomLimits: false,
                touchZoom: 'center',
                // Enhanced zoom settings
                fadeAnimation: false,
                zoomAnimation: true,
                zoomSnap: 0,
                zoomDelta: 0.25,
                // Prevent gray tiles
                errorTileUrl: 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7',
                // Enhanced caching
                crossOrigin: true,
                subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
            });
            
            // Create streets layer with enhanced options
            const streetsLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 22,
                maxNativeZoom: 19,

                crossOrigin: true
            });
            
            // Add the selected layer to the map
            if (fieldData.mapType === 'satellite') {

                streetsLayer.addTo(map);

            // Add trees to map
            fieldData.trees.forEach(tree => {

    const url = window.URL.createObjectURL(blob);

    a.download = 'field_design.html';
    document.body.appendChild(a);
    a.click();
    window.URL.revokeObjectURL(url);
    document.body.removeChild(a);
});
    
  </script>
